<!DOCTYPE html>
<html lang="ru" data-theme="light" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Цель проекта</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F5F7FA;
            overflow: hidden;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #FFFFFF;
            color: #1A2E5A;
        }
        /* Header */
        .header-bar {
            height: 100px;
            display: flex;
            align-items: center;
            padding-left: 60px;
            border-bottom: 2px solid #E8EDF5;
        }
        .header-title {
            font-size: 36px;
            font-weight: 700;
            color: #1A2E5A;
            position: relative;
            padding-bottom: 10px;
        }
        .header-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 80px;
            height: 4px;
            background-color: #2E6BE6;
        }
        
        /* Main Goal Area */
        .main-goal-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 80px;
            position: relative;
            z-index: 10;
        }
        
        .goal-box {
            background-color: #1A2E5A;
            padding: 60px;
            border-radius: 12px;
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 60px;
            box-shadow: 0 10px 25px rgba(26, 46, 90, 0.1);
        }
        
        .goal-box::before {
            content: 'Цель';
            position: absolute;
            top: -20px;
            left: 40px;
            background-color: #2E6BE6;
            color: white;
            padding: 5px 20px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        .main-text {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.3;
            text-align: center;
            color: #FFFFFF;
        }

        /* Sub-points */
        .sub-points-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1000px;
            margin-top: 20px;
        }

        .sub-point {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #F8FAFC;
            border: 1px solid #E8EDF5;
            border-radius: 8px;
            margin: 0 15px;
            transition: transform 0.3s ease;
        }

        .sub-point:first-child { margin-left: 0; }
        .sub-point:last-child { margin-right: 0; }

        .icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #E8EDF5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: #2E6BE6;
            font-size: 24px;
        }

        .sub-text {
            font-size: 18px;
            font-weight: 500;
            color: #4B5563;
            text-align: center;
        }

        /* Decorative Background */
        .bg-lines {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background-image: 
                linear-gradient(#E8EDF5 1px, transparent 1px),
                linear-gradient(90deg, #E8EDF5 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: 0;
        }

        .corner-accent {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 0 150px 150px;
            border-color: transparent transparent #E8EDF5 transparent;
            z-index: 1;
        }

        .page-number {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 14px;
            color: #9CA3AF;
            z-index: 20;
        }
        
        .footer-info {
            position: absolute;
            bottom: 20px;
            left: 60px;
            font-size: 14px;
            color: #9CA3AF;
            z-index: 20;
        }
    </style>
</head>
<body style="">
<div class="slide-container">
<!-- Background Grid -->
<div class="bg-lines"></div>
<div class="corner-accent"></div>
<!-- Header -->
<div class="header-bar z-20">
<h1 class="header-title">Цель проекта</h1>
</div>
<!-- Main Content -->
<div class="main-goal-container">
<!-- Central Main Goal -->
<div class="goal-box">
<p class="main-text">
                    Разработка информационной системы для автоматизации учёта абитуриентов колледжа
                </p>
</div>
<!-- Supporting Points -->
<div class="sub-points-container">
<div class="sub-point">
<div class="icon-circle">
<i class="fa-solid fa-database"></i>
</div>
<p class="sub-text">Единая база данных</p>
</div>
<div class="sub-point">
<div class="icon-circle">
<i class="fa-solid fa-file-contract"></i>
</div>
<p class="sub-text">Электронный документооборот</p>
</div>
<div class="sub-point">
<div class="icon-circle">
<i class="fa-solid fa-users-gear"></i>
</div>
<p class="sub-text">Доступ сотрудников</p>
</div>
</div>
</div>
<!-- Footer -->
<div class="footer-info">
<p>Дипломный проект: Разработка клиент-серверной системы для верификации абитуриентов с самозаполнением данных и интеграцией с НОБД</p>
</div>
<div class="page-number">4</div>
</div>

</body></html>
