<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход администратора</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f5fb;
            color: #1a2e5a;
        }
        .container {
            width: 380px;
            max-width: calc(100% - 32px);
            margin: 80px auto;
            background: #fff;
            border: 1px solid #d8e0f0;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin: 0 0 16px;
            font-size: 28px;
        }
        .field {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #c8d3eb;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 15px;
        }
        .error {
            background: #fff0f0;
            color: #8a1d1d;
            border: 1px solid #f3c1c1;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
            font-size: 14px;
        }
        button {
            border: 0;
            border-radius: 8px;
            background: #2e6be6;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            padding: 12px 18px;
            cursor: pointer;
            width: 100%;
        }
        .back {
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
        }
        .back a {
            color: #2e6be6;
            text-decoration: none;
        }
    </style>
</head>
<body>
<main class="container">
    <h1>Админ-панель</h1>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
        <div class="field">
            <label for="username">Логин</label>
            <input id="username" name="username" required>
        </div>
        <div class="field">
            <label for="password">Пароль</label>
            <input id="password" name="password" type="password" required>
        </div>
        <button type="submit">Войти</button>
    </form>
    <div class="back">
        <a href="/">К форме регистрации</a>
    </div>
</main>
</body>
</html>
