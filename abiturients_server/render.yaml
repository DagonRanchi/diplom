services:
  - type: web
    name: cet-register
    runtime: docker
    plan: free
    healthCheckPath: /health
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cet-admissions-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 720
      - key: CORS_ORIGINS
        value: https://cet-nyzd.onrender.com
      - key: ENVIRONMENT
        value: production

  - type: web
    name: cet-nyzd
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://cet-register.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: cet-admissions-db
    plan: free
    databaseName: cet_admissions
    user: cet_admissions_user
