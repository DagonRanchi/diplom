services:
  postgres:
    image: postgres:16-alpine
    container_name: umz_postgres
    environment:
      POSTGRES_DB: umz_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d umz_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: umz_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/umz_portal
      JWT_SECRET: local-dev-change-me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 720
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      ENVIRONMENT: local
      PORT: 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: umz_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
