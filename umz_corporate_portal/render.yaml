services:
  - type: web
    name: umz-corporate-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: umz-corporate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 720
      - key: CORS_ORIGINS
        value: https://umz-corporate-web.onrender.com
      - key: ENVIRONMENT
        value: production

  - type: web
    name: umz-corporate-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://umz-corporate-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: umz-corporate-db
    plan: free
    databaseName: umz_portal
    user: umz_portal_user
